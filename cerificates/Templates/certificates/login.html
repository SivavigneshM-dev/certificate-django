{% extends 'certificates/base.html' %}
{% block title %}Login — Grapinz Cert{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <span class="text-3xl">🔐</span>
      </div>
      <h1 class="text-3xl font-extrabold text-gray-900">Welcome Back</h1>
      <p class="text-gray-500 mt-1">Login to your Grapinz Cert account.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-md p-8">
      <form method="POST" class="space-y-5">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
          <input type="text" name="username" required
                 class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-400"
                 placeholder="your_username"/>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
          <input type="password" name="password" required
                 class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-400"
                 placeholder="••••••••"/>
        </div>

        <button type="submit" class="btn-primary w-full py-3 text-base">Login</button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a href="{% url 'signup' %}" class="text-blue-600 font-semibold hover:underline">Sign Up</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
