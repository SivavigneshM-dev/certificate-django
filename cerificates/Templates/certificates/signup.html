{% extends 'certificates/base.html' %}
{% block title %}Sign Up — Grapinz Cert{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <span class="text-3xl">🚀</span>
      </div>
      <h1 class="text-3xl font-extrabold text-gray-900">Create Account</h1>
      <p class="text-gray-500 mt-1">Join Grapinz Cert today.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-md p-8">
      <form method="POST" class="space-y-5">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
          <input type="text" name="username" required
                 class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-400"
                 placeholder="choose_a_username"/>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
          <input type="email" name="email" required
                 class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-400"
                 placeholder="you@example.com"/>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
          <input type="password" name="password1" required minlength="8"
                 class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-400"
                 placeholder="Min 8 characters"/>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm Password</label>
          <input type="password" name="password2" required
                 class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-400"
                 placeholder="Repeat password"/>
        </div>

        <button type="submit" class="btn-primary w-full py-3 text-base">Create Account</button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="{% url 'login' %}" class="text-blue-600 font-semibold hover:underline">Login</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
